<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/cinquains.css" />
    <title>Cinquains | stream of me</title>
  </head>
  <body>
    <!-- Home nav -->
    <nav
      class="home-nav"
      role="navigation"
      aria-label="Return to main navigation"
    >
      <a href="../index.html" class="home-link" aria-label="Return to homepage">
        <svg
          viewBox="0 0 24 24"
          width="24"
          height="24"
          aria-hidden="true"
          class="home-icon"
        >
          <path
            d="M12 3L4 9v12h16V9l-8-6z"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
          />
          <path
            d="M9 22v-8h6v8"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
          />
        </svg>
      </a>
    </nav>

    <main class="container">
      <div class="cinquains">
        <article class="cinquain">
          <time datetime="2024-12-23">12-23-24</time>
          <div class="poem">
            <p>mist sits</p>
            <p>in this valley</p>
            <p>in a space between light</p>
            <p>at dawn with the moon looking on</p>
            <p>in thought</p>
          </div>
        </article>
        <article class="cinquain">
          <time datetime="2024-12-22">12-22-24</time>
          <div class="poem">
            <p>this rain</p>
            <p>is an ocean</p>
            <p>that has changed its state - form</p>
            <p>and travelled the sky - just to be</p>
            <p>with you</p>
          </div>
        </article>
      </div>
    </main>
  </body>
</html>
