<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/tallies.css" />
    <title>Daily Notice | stream of me</title>
  </head>
  <body>
    <!-- Home navigation -->
    <nav
      class="home-nav"
      role="navigation"
      aria-label="Return to main navigation"
    >
      <a href="../index.html" class="home-link" aria-label="Return to homepage">
        <svg
          viewBox="0 0 24 24"
          width="24"
          height="24"
          aria-hidden="true"
          class="home-icon"
        >
          <path
            d="M12 3L4 9v12h16V9l-8-6z"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
          />
          <path
            d="M9 22v-8h6v8"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
          />
        </svg>
      </a>
    </nav>

    <main class="container">
      <div class="observations">
        <div class="category">
          <h2>sun rise awareness</h2>
          <p class="tally" aria-label="1 sunrises">S</p>
          <p class="count1" aria-label="total">1</p>
        </div>

        <div class="category">
          <h2>glimpses of the moon</h2>
          <p class="tally" aria-label="0 moon sightings"></p>
          <p class="count1" aria-label="total">0</p>
        </div>

        <div class="category">
          <h2>trees talked to</h2>
          <p class="tally" aria-label="1 tree conversations">K</p>
          <p class="count1" aria-label="total">1</p>
        </div>

        <div class="category">
          <h2>songs Learned</h2>
          <p class="tally" aria-label="1 song">n</p>
          <p class="count1" aria-label="total">0</p>
        </div>

        <div class="category">
          <h2>stretchy days</h2>
          <p class="tally" aria-label="2 practices">a</p>
          <p class="count1" aria-label="total">0</p>
        </div>
      </div>
    </main>
  </body>
</html>
